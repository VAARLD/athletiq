<style>
:root{
  --bg:#07070f;--card:#0f0f1c;--card2:#13131f;--border:#1c1c30;
  --accent:#00e5ff;--adim:#00e5ff12;--aglow:#00e5ff30;
  --orange:#ff6b2b;--green:#00ff9d;--red:#ff4466;--yellow:#ffe44d;--purple:#c084fc;
  --text:#eeeef5;--muted:#35354f;--label:#606080;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:'Courier New',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}
input,textarea,select{outline:none!important;-webkit-appearance:none;font-family:inherit}
input[type=range]{cursor:pointer}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-thumb{background:#1e1e32;border-radius:2px}
#root{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

/* ANIMATIONS */

body.light-mode{
  --bg:#f5f5fa;--card:#ffffff;--card2:#eeeef5;--border:#e0e0ea;
  --text:#111118;--muted:#c0c0d0;--label:#606080;
  --adim:#00e5ff18;--aglow:#00e5ff22;
}
body.light-mode ::-webkit-scrollbar-thumb{background:#d0d0e0}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 20px var(--aglow)}50%{box-shadow:0 0 40px var(--aglow),0 0 80px var(--adim)}}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes ring{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.15);opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes streak{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1);transform-origin:left}}
</style>
</head>

const Btn=({children,onClick,disabled,variant="primary",style:s={}})=>{
  const base={width:"100%",padding:"17px 20px",borderRadius:"14px",border:"none",
    cursor:disabled?"not-allowed":"pointer",fontSize:"15px",fontFamily:"var(--sans)",
    fontWeight:600,transition:"all 0.25s",letterSpacing:"0.01em"};
  const variants={
    primary:{background:disabled?"#1a1a2e":`linear-gradient(135deg,var(--accent),#0088ff)`,
      color:disabled?"var(--muted)":"#000",opacity:disabled?.5:1,
      boxShadow:disabled?"none":`0 4px 24px var(--aglow)`},
    green:{background:`linear-gradient(135deg,var(--green),#00cc7a)`,color:"#000",
      boxShadow:`0 4px 24px #00ff9d30`},
    ghost:{background:"transparent",border:`1px solid var(--border)`,color:"var(--label)"},
    orange:{background:`linear-gradient(135deg,var(--orange),#ff8c00)`,color:"#fff",
      boxShadow:`0 4px 24px #ff6b2b30`},
  };
  return <button onClick={disabled?undefined:onClick} style={{...base,...variants[variant],...s}}>{children}</button>;
};

    resize:"vertical",lineHeight:1.6}}/>

const Slide=({label,value,min,max,onChange,unit,color="var(--accent)"})=>{
  const pct=((value-min)/(max-min))*100;
  return(
    <div style={{marginBottom:"24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:"10px"}}>
        <span style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",letterSpacing:"0.1em"}}>{label}</span>
        <span style={{fontSize:"16px",fontWeight:700,color,fontFamily:"var(--mono)"}}>{value}{unit}</span>
      </div>
      <div style={{position:"relative",height:"4px",background:"var(--border)",borderRadius:"2px"}}>
        <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct}%`,background:color,borderRadius:"2px",transition:"width 0.1s"}}/>
        <input type="range" min={min} max={max} value={value} onChange={e=>onChange(Number(e.target.value))}
          style={{position:"absolute",top:"-10px",left:0,width:"100%",height:"24px",opacity:0,cursor:"pointer",margin:0}}/>
        <div style={{position:"absolute",top:"50%",left:`${pct}%`,transform:"translate(-50%,-50%)",
          width:"20px",height:"20px",borderRadius:"50%",background:color,border:"3px solid var(--bg)",
          boxShadow:`0 0 12px ${color}88`,pointerEvents:"none",transition:"left 0.1s"}}/>
      </div>
    </div>
  );
};

                <Tag key={b} label={b} color={b==="Aucune blessure"?"var(--green)":"var(--red)"}
                  selected={(d.blessures||[]).includes(b)} onClick={()=>toggle("blessures",b)}/>
              ))}
            </div>
          </div>
          <div style={{marginBottom:"22px"}}>
            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"8px"}}>PRÉCISEZ VOS DOULEURS (optionnel)</div>
            <TA placeholder="Ex: douleur genou gauche en descente, hernie L4-L5 diagnostiquée..." value={d.douleurs} onChange={v=>set("douleurs",v)}/>
          </div>
          <Slide label="QUALITÉ DU SOMMEIL" value={d.sommeil} min={1} max={5} onChange={v=>set("sommeil",v)} unit={[""," Très mauvais"," Mauvais"," Moyen"," Bon"," Excellent"][d.sommeil]} color="var(--purple)"/>
          <Slide label="NIVEAU DE STRESS" value={d.stress} min={1} max={5} onChange={v=>set("stress",v)} unit={[""," Très faible"," Faible"," Modéré"," Élevé"," Très élevé"][d.stress]} color="var(--red)"/>
          <Slide label="ÉNERGIE GÉNÉRALE" value={d.energie} min={1} max={5} onChange={v=>set("energie",v)} unit={[""," Épuisé"," Fatigué"," Normal"," Énergique"," Excellent"][d.energie]} color="var(--green)"/>
        </div>}

        {/* STEP 4 — Objectif */}
        {step===4&&<div>
          <SLabel sub="La précision de votre objectif détermine toute la structure du programme.">04 — Objectif principal</SLabel>
          <div style={{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"20px"}}>
            {GOALS.map(g=>(
              <button key={g.id} onClick={()=>set("objectif",g.id)} style={{
                display:"flex",alignItems:"center",gap:"12px",padding:"14px 16px",borderRadius:"14px",
                border:`1px solid ${d.objectif===g.id?g.color:"var(--border)"}`,

          </div>
          {d.objectif==="sport"&&(
            <div style={{marginBottom:"16px"}}>
              <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"8px"}}>QUEL SPORT ?</div>
              <Inp placeholder="Football, Rugby, Tennis, Basketball..." value={d.sportSpec} onChange={v=>set("sportSpec",v)}/>
            </div>
          )}
          {/* Priorités multiples */}
          <div style={{marginBottom:"16px"}}>
            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>PRIORITÉS SECONDAIRES (optionnel)</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {["Perte de gras","Gain musculaire","Mobilité","Énergie quotidienne","Santé articulaire","Posture","Confiance en soi"].map(p=>(
                <Tag key={p} label={p} selected={(d.priorites||[]).includes(p)} onClick={()=>toggle("priorites",p)}/>
              ))}
            </div>
          </div>
          <div style={{marginBottom:"16px"}}>
            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>COMPÉTITION EN VUE ?</div>
            <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
              <Tag label="Oui" selected={d.competition===true} onClick={()=>set("competition",true)} color="var(--green)"/>

        {/* STEP 5 — Historique */}
        {step===5&&<div>
          <SLabel sub="Votre historique révèle des patterns de progression uniques à exploiter.">05 — Historique sportif</SLabel>

        {/* STEP 6 — Équipement */}

          <SLabel sub="L'équipement disponible définit les exercices possibles et la structure des séances.">06 — Disponibilités & Équipement</SLabel>

            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>JOURS DISPONIBLES PAR SEMAINE</div>

              {["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].map(j=>(
                <Tag key={j} label={j} selected={(d.joursDispos||[]).includes(j)} onClick={()=>toggle("joursDispos",j)}/>
              ))}
            </div>
          </div>
          <div style={{marginBottom:"18px"}}>
            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>CRÉNEAUX PRÉFÉRÉS</div>
            <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
              {["Matin (6h-10h)","Midi (11h-14h)","Après-midi (14h-18h)","Soir (18h-22h)"].map(c=>(
                <Tag key={c} label={c} selected={(d.creneaux||[]).includes(c)} onClick={()=>toggle("creneaux",c)}/>
              ))}
            </div>
          </div>
          <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>ÉQUIPEMENT DISPONIBLE</div>
          {EQUIPEMENTS.map(e=><CardOpt key={e.id} opt={e} selected={(d.equipements||[]).includes(e.id)} multi

            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"8px"}}>PRÉCISIONS SUR VOS LIEUX</div>
            <TA placeholder="Salle Fitness Park 3x/sem + home gym le week-end..." value={d.lieu} onChange={v=>set("lieu",v)}/>
          </div>
        </div>}

        {/* STEP 7 — Lifestyle */}
        {step===7&&<div>
          <SLabel sub="La nutrition et le mode de vie permettent une personnalisation holistique.">07 — Lifestyle & Nutrition</SLabel>
          <div style={{display:"flex",flexDirection:"column",gap:"18px"}}>
            <div>
              <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>PROFIL ALIMENTAIRE</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
                {["Omnivore","Végétarien","Vegan","Keto / Low-carb","Méditerranéen","Aucun régime particulier"].map(n=>(
                  <Tag key={n} label={n} selected={d.alimentaire===n} onClick={()=>set("alimentaire",n)}/>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"8px"}}>SUPPLÉMENTS ACTUELS</div>
              <Inp placeholder="Whey, créatine, BCAA, oméga-3, aucun..." value={d.supplements} onChange={v=>set("supplements",v)}/>
            </div>
            <div>
              <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>HYDRATATION QUOTIDIENNE</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>

                  <Tag key={h} label={h} selected={d.hydratation===h} onClick={()=>set("hydratation",h)}/>
                ))}
              </div>
            </div>
            <div>
              <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"8px"}}>VOS MOTIVATIONS PROFONDES</div>
              <TA placeholder="Pourquoi ce programme ? Qu'est-ce qui vous motive vraiment ?" value={d.motivations} onChange={v=>set("motivations",v)}/>

          </div>
        </div>}

        {/* STEP 8 — Préférences */}
        {step===8&&<div>
          <SLabel sub="Vos préférences d'entraînement maximisent l'adhésion et le plaisir.">08 — Préférences d'entraînement</SLabel>
          <div style={{marginBottom:"20px"}}>
            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>TYPES D'EXERCICES APPRÉCIÉS</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px"}}>
              {["Musculation","HIIT","Cardio steady-state","Yoga / Étirements","Calisthenics","Running","Natation","Boxe / Arts martiaux","Cyclisme"].map(p=>(
                <Tag key={p} label={p} selected={(d.preferences||[]).includes(p)} onClick={()=>toggle("preferences",p)}/>
              ))}
            </div>
          </div>
          <div style={{marginBottom:"20px"}}>
            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"10px"}}>STYLE D'ENTRAÎNEMENT PRÉFÉRÉ</div>
            {["Seul(e) et concentré(e)","En groupe ou cours collectifs","Avec un partenaire","Peu importe"].map((s,i)=>(
              <CardOpt key={i} opt={{label:s}} selected={d.styleEntrainement===s} onClick={()=>set("styleEntrainement",s)}/>
            ))}
          </div>
          <div>
            <div style={{fontSize:"12px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"8px"}}>AUTRES INFORMATIONS IMPORTANTES</div>
            <TA placeholder="Traitement médical, contraintes spécifiques, expériences passées..." value={d.autresInfos} onChange={v=>set("autresInfos",v)}/>
          </div>
        </div>}

        {/* STEP 9 — Recap */}
        {step===9&&<div>
          <SLabel sub="Vérifiez votre profil avant la génération.">09 — Récapitulatif</SLabel>
          {[
            {label:"Identité",emoji:"◎",items:[`${d.prenom||"—"} · ${d.genre||"—"} · ${d.age} ans`,`${d.poids}kg · ${d.taille}cm · IMC ${(d.poids/((d.taille/100)**2)).toFixed(1)}`]},
            {label:"Morphologie",emoji:"⬡",items:[MORPHO.find(m=>m.id===d.morpho)?.label||"Non renseigné",d.silhouette||"—"]},
            {label:"Forme actuelle",emoji:"♡",items:[d.activite||"Non renseigné",`Blessures: ${d.blessures?.join(", ")||"Aucune"}`,`Sommeil ${d.sommeil}/5 · Stress ${d.stress}/5`]},
            {label:"Objectif",emoji:"◈",items:[GOALS.find(g=>g.id===d.objectif)?.label||"Non renseigné",`${d.seances} séances/sem · ${d.duree} min`,d.competition?`Compét: ${d.dateCompe}`:"Pas de compétition"]},
            {label:"Expérience",emoji:"◷",items:[d.experience||"Non renseigné",d.sportsAnte||"—"]},
            {label:"Équipement",emoji:"◰",items:[d.equipements?.map(id=>EQUIPEMENTS.find(e=>e.id===id)?.label).filter(Boolean).join(", ")||"Non renseigné",`Jours: ${d.joursDispos?.join(", ")||"—"}`]},
            {label:"Lifestyle",emoji:"◭",items:[d.alimentaire||"Non renseigné",`Hydratation: ${d.hydratation||"—"}`]},
          ].map((s,i)=>(
            <div key={i} style={{background:"var(--card)",borderRadius:"14px",
              border:"1px solid var(--border)",padding:"14px 16px",marginBottom:"10px"}}>
              <div style={{fontSize:"10px",color:"var(--accent)",fontFamily:"var(--mono)",
                letterSpacing:"0.2em",marginBottom:"8px",display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontSize:"14px"}}>{s.emoji}</span>
                {s.label.toUpperCase()}
              </div>
              {s.items.filter(Boolean).map((item,j)=>(
                <div key={j} style={{fontSize:"13px",color:"var(--label)",marginBottom:"3px"}}>· {item}</div>
              ))}
            </div>
          ))}
          <div style={{marginTop:"10px",padding:"16px",background:"var(--adim)",
            borderRadius:"14px",border:"1px solid var(--accent)25"}}>
            <div style={{fontSize:"13px",color:"var(--accent)",lineHeight:1.6}}>
              ✦ L'IA va analyser vos <strong>{Object.values(d).filter(v=>v&&v!=="").length}</strong> données et générer un programme 100% personnalisé basé sur les études scientifiques mondiales.
            </div>
          </div>
        </div>}
      </div>

      {/* Nav buttons */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,maxWidth:"480px",margin:"0 auto",
        padding:"14px 24px 32px",background:"var(--bg)f0",backdropFilter:"blur(16px)",
        borderTop:"1px solid var(--border)"}}>
        <div style={{display:"flex",gap:"10px"}}>
          <button onClick={prev} style={{padding:"16px 18px",background:"var(--card)",
            border:"1px solid var(--border)",borderRadius:"12px",color:"var(--muted)",
            cursor:"pointer",fontSize:"18px",transition:"all 0.2s"}}>←</button>
          <button onClick={step===TOTAL_STEPS?()=>onSubmit(d):next} style={{
            flex:1,padding:"16px",borderRadius:"12px",border:step===TOTAL_STEPS?"none":"1px solid var(--border)",
            cursor:"pointer",fontFamily:"var(--sans)",fontSize:"15px",fontWeight:600,
            background:step===TOTAL_STEPS?`linear-gradient(135deg,var(--accent),#0088ff)`:"var(--card)",
            color:step===TOTAL_STEPS?"#000":"var(--text)",
            boxShadow:step===TOTAL_STEPS?"0 4px 20px var(--aglow)":"none",
            transition:"all 0.25s",
          }}>
            {step===TOTAL_STEPS?"⚡ Générer mon programme":"Continuer →"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── GENERATING SCREEN ──────────────────────────────────────────────────────────
function GeneratingScreen(){
  const[idx,setIdx]=useState(0);
  const[progress,setProgress]=useState(0);
  useEffect(()=>{
    const t1=setInterval(()=>setIdx(i=>(i+1)%LOADING_MSGS.length),1800);
    const t2=setInterval(()=>setProgress(p=>Math.min(p+1.2,95)),180);
    return()=>{clearInterval(t1);clearInterval(t2);};
  },[]);
  const msg=LOADING_MSGS[idx];
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",
      justifyContent:"center",flexDirection:"column",gap:"36px",fontFamily:"var(--sans)",padding:"24px"}}>
      {/* Animated rings */}
      <div style={{position:"relative",width:"100px",height:"100px"}}>
        <div style={{position:"absolute",inset:0,border:"1px solid var(--border)",borderRadius:"50%"}}/>
        <div style={{position:"absolute",inset:0,border:"2px solid var(--accent)",
          borderTopColor:"transparent",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
        <div style={{position:"absolute",inset:"14px",border:"1px solid var(--accent)33",
          borderBottomColor:"transparent",borderRadius:"50%",animation:"spin 2s linear infinite reverse"}}/>
        <div style={{position:"absolute",inset:"28px",border:"2px solid var(--orange)",
          borderTopColor:"transparent",borderRightColor:"transparent",borderRadius:"50%",
          animation:"spin 1.5s linear infinite"}}/>
        <div style={{position:"absolute",inset:"50%",transform:"translate(-50%,-50%)",
          width:"12px",height:"12px",borderRadius:"50%",background:"var(--accent)",
          boxShadow:"0 0 20px var(--accent)",animation:"pulse 1s infinite"}}/>
      </div>

      <div style={{textAlign:"center",maxWidth:"300px"}}>
        <div style={{fontFamily:"var(--serif)",fontSize:"22px",fontWeight:700,
          color:"var(--text)",marginBottom:"16px",letterSpacing:"-0.01em"}}>
          Génération en cours...
        </div>
        {/* Progress bar */}
        <div style={{height:"4px",background:"var(--border)",borderRadius:"2px",marginBottom:"20px"}}>
          <div style={{height:"100%",width:`${progress}%`,
            background:"linear-gradient(90deg,var(--accent),var(--green))",
            borderRadius:"2px",transition:"width 0.2s ease",
            boxShadow:"0 0 10px var(--aglow)"}}/>
        </div>
        {/* Current step */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",
          gap:"10px",animation:"fadeIn 0.4s ease"}} key={idx}>
          <span style={{fontSize:"20px"}}>{msg.icon}</span>
          <span style={{fontSize:"14px",color:"var(--label)",lineHeight:1.6}}>{msg.text}</span>
        </div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:"8px",width:"100%",maxWidth:"280px"}}>
        {LOADING_MSGS.slice(0,idx+1).map((m,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:"10px",
            animation:"slideRight 0.3s ease",opacity:i===idx?1:0.4}}>
            <div style={{width:"18px",height:"18px",borderRadius:"50%",
              background:i===idx?"var(--accent)":"var(--green)",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:"10px",flexShrink:0}}>
              {i===idx?<span style={{animation:"spin 1s linear infinite",display:"block",fontSize:"8px"}}>◌</span>:"✓"}
            </div>
            <span style={{fontSize:"12px",color:i===idx?"var(--text)":"var(--label)"}}>{m.text}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PROGRAM SCREEN ─────────────────────────────────────────────────────────────
function ProgramScreen({program,clientName,onStartSession,onBack,onNew}){
  const lang=localStorage.getItem(LANG_STORAGE_KEY)||'fr';

  const[copied,setCopied]=useState(false);

    let t=`PROGRAMME ${(prog?.titre||"").toUpperCase()}\nAthletIQ Pro — ${clientName}\n${"═".repeat(40)}\n\n`;

      t+=`\nSÉANCE ${i+1} — ${s.nom||""}\nFocus: ${s.focus||""}\n\n`;

// ── SESSION SCREEN ─────────────────────────────────────────────────────────────
function SessionScreen({sessions,sessionIndex,clientName,programId,onDone}){
  const lang=localStorage.getItem(LANG_STORAGE_KEY)||'fr';
  const t=TR[lang]||TR.fr;
  const session=sessions?.[sessionIndex];
  const allExos=session?.blocs?.flatMap(b=>b.exercices?.map(ex=>({...ex,bloc:b.nom}))||[])||[];
  const[checked,setChecked]=useState({});
  const[timer,setTimer]=useState(null);
  const[journal,setJournal]=useState({});
  const[showJournal,setShowJournal]=useState(null);
  const[ressenti,setRessenti]=useState("");
  const intervalRef=useRef(null);
  const startTime=useRef(Date.now());
  const completed=Object.values(checked).filter(Boolean).length;
  const total=allExos.length;
  const pct=total?Math.round((completed/total)*100):0;

  const startRest=secs=>{
    clearInterval(intervalRef.current);
    setTimer({s:secs,max:secs});
    intervalRef.current=setInterval(()=>{
      setTimer(t=>{if(!t||t.s<=1){clearInterval(intervalRef.current);return null;}return{...t,s:t.s-1};});
    },1000);
  };
  useEffect(()=>()=>clearInterval(intervalRef.current),[]);

  const toggle=id=>setChecked(c=>({...c,[id]:!c[id]}));
  const saveJournalEntry=(id,data)=>setJournal(j=>({...j,[id]:data}));

  const finish=()=>{
    const duration=Math.round((Date.now()-startTime.current)/60000);
    onDone({completed:pct===100,pct,duration,journal,ressenti});
  };

  if(!session)return null;
  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",fontFamily:"var(--sans)",color:"var(--text)",paddingBottom:"120px"}}>
      {/* Header */}
      <LangThemeBar/>
      <div style={{position:"sticky",top:0,zIndex:10,background:"var(--bg)f0",
        backdropFilter:"blur(16px)",borderBottom:"1px solid var(--border)"}}>
        <div style={{padding:"14px 24px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"10px"}}>
            <div>
              <div style={{fontSize:"11px",color:"var(--green)",fontFamily:"var(--mono)",letterSpacing:"0.15em"}}>SÉANCE EN COURS</div>
              <div style={{fontFamily:"var(--serif)",fontSize:"17px",fontWeight:700}}>{session.nom}</div>
              <div style={{fontSize:"12px",color:"var(--label)",marginTop:"2px"}}>{session.focus}</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:"30px",fontWeight:700,color:pct===100?"var(--green)":"var(--accent)",
                fontFamily:"var(--mono)",lineHeight:1}}>{pct}%</div>
              <div style={{fontSize:"11px",color:"var(--muted)"}}>{completed}/{total} exercices</div>
            </div>
          </div>
          <div style={{height:"6px",background:"var(--border)",borderRadius:"3px",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,borderRadius:"3px",transition:"width 0.5s ease",
              background:pct===100?"linear-gradient(90deg,var(--green),#00cc7a)":"linear-gradient(90deg,var(--accent),#0088ff)"}}/>
          </div>
        </div>
      </div>

      {/* Timer */}
      {timer&&(
        <div style={{margin:"16px 24px",background:"var(--orange)12",border:"1px solid var(--orange)40",
          borderRadius:"18px",padding:"22px",textAlign:"center",animation:"popIn 0.3s ease"}}>
          <div style={{fontSize:"10px",color:"var(--orange)",fontFamily:"var(--mono)",letterSpacing:"0.2em",marginBottom:"10px"}}>⏱ TEMPS DE REPOS</div>
          <div style={{fontSize:"64px",fontWeight:700,color:"var(--orange)",fontFamily:"var(--mono)",
            lineHeight:1,letterSpacing:"-0.03em"}}>
            {String(Math.floor(timer.s/60)).padStart(2,"0")}:{String(timer.s%60).padStart(2,"0")}
          </div>
          <div style={{marginTop:"12px",height:"5px",background:"var(--border)",borderRadius:"3px",overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(timer.s/timer.max)*100}%`,
              background:"var(--orange)",borderRadius:"3px",transition:"width 1s linear"}}/>
          </div>
          <button onClick={()=>{clearInterval(intervalRef.current);setTimer(null);}} style={{
            marginTop:"14px",background:"transparent",border:"1px solid var(--orange)50",
            borderRadius:"10px",color:"var(--orange)",padding:"9px 24px",
            cursor:"pointer",fontSize:"13px",fontFamily:"var(--sans)",fontWeight:500}}>

// ── BADGE SYSTEM ───────────────────────────────────────────────────────────────
const BADGE_DEFS=[
  {id:"first",icon:"🏅",label:"Premier programme",condition:(progs,sessions)=>progs>=1},
  {id:"five_sessions",icon:"⭐",label:"5 séances",condition:(progs,sessions)=>sessions>=5},
  {id:"ten_sessions",icon:"🔥",label:"10 séances",condition:(progs,sessions)=>sessions>=10},
  {id:"three_programs",icon:"💪",label:"3 programmes",condition:(progs,sessions)=>progs>=3},
  {id:"month",icon:"📅",label:"1 mois régulier",condition:(progs,sessions)=>sessions>=12},
];

function checkAndAwardBadges(client,programs,totalSessions){
  const current=db.get(`iq:badges:${client.toLowerCase()}`)||[];
  const earned=BADGE_DEFS.filter(b=>!current.find(c=>c.id===b.id)&&b.condition(programs.length,totalSessions));
  if(earned.length>0){
    const newBadges=[...current,...earned.map(b=>({id:b.id,icon:b.icon,label:b.label,date:new Date().toISOString()}))];
    db.set(`iq:badges:${client.toLowerCase()}`,newBadges);
  }
  return earned;
}

// ── THEME + LANG TOGGLE BUTTON ─────────────────────────────────────────────────
function LangThemeBar(){
  const[lang,setLangState]=useState(()=>localStorage.getItem(LANG_STORAGE_KEY)||'fr');
  const[dark,setDark]=useState(()=>localStorage.getItem(THEME_STORAGE_KEY)!=='light');
  const t=TR[lang]||TR.fr;
  useEffect(()=>{
    document.body.classList.toggle('light-mode',!dark);
    localStorage.setItem(THEME_STORAGE_KEY,dark?'dark':'light');
  },[dark]);
  const toggleLang=()=>{const nl=lang==='fr'?'en':'fr';localStorage.setItem(LANG_STORAGE_KEY,nl);setLangState(nl);window.location.reload();};
  const toggleTheme=()=>setDark(d=>!d);
  return(
    <div style={{position:'fixed',top:12,right:12,zIndex:200,display:'flex',gap:'6px',alignItems:'center'}}>
      <button onClick={toggleTheme} title={dark?t.lightMode:t.darkMode} style={{width:'36px',height:'36px',borderRadius:'10px',border:'1px solid var(--border)',background:'var(--card)',cursor:'pointer',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text)'}}>
        {dark?'☀️':'🌙'}

      <button onClick={toggleLang} style={{height:'36px',borderRadius:'10px',border:'1px solid var(--border)',background:'var(--card)',cursor:'pointer',fontSize:'12px',fontWeight:700,padding:'0 10px',color:'var(--accent)',fontFamily:'var(--mono)',letterSpacing:'0.05em'}}>
        {t.langToggle}
      </button>
    </div>
  );
}

// ── QUICK REGEN ────────────────────────────────────────────────────────────────
function QuickRegenScreen({lastProgram,onSubmit,onSkip}){
  const lang=localStorage.getItem(LANG_STORAGE_KEY)||'fr';
  const t=TR[lang]||TR.fr;
  const[q1,setQ1]=useState('');
  const[q2,setQ2]=useState([]);
  const[q3,setQ3]=useState('');
  const toggle2=v=>setQ2(a=>a.includes(v)?a.filter(x=>x!==v):[...a,v]);
  const ready=q1&&q3;
  const submit=()=>{
    const note=`Previous program feedback: ${q1}. Changes noticed: ${q2.join(', ')||'none'}. Goal adjustment: ${q3}.`;
    onSubmit(note);
  };
  return(
    <div style={{minHeight:'100vh',background:'var(--bg)',fontFamily:'var(--sans)',color:'var(--text)',padding:'60px 24px 120px',animation:'fadeUp 0.4s ease'}}>
      <LangThemeBar/>
      <div style={{fontSize:'11px',color:'var(--green)',fontFamily:'var(--mono)',letterSpacing:'0.2em',marginBottom:'12px'}}>🔄 {t.quickRegen.toUpperCase()}</div>
      <h2 style={{fontFamily:'var(--serif)',fontSize:'26px',fontWeight:700,letterSpacing:'-0.02em',marginBottom:'28px',lineHeight:1.2}}>{t.quickRegenSub}</h2>
      <div style={{display:'flex',flexDirection:'column',gap:'24px'}}>
        <div>
          <div style={{fontSize:'12px',color:'var(--label)',fontFamily:'var(--mono)',marginBottom:'10px'}}>1 — {t.q1.toUpperCase()}</div>
          {t.q1opts.map(opt=>(
            <button key={opt.v} onClick={()=>setQ1(opt.v)} style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px',borderRadius:'12px',border:`1px solid ${q1===opt.v?'var(--accent)':'var(--border)'}`,background:q1===opt.v?'var(--adim)':'var(--card)',cursor:'pointer',textAlign:'left',width:'100%',marginBottom:'8px',transition:'all 0.18s'}}>
              <span style={{fontSize:'22px'}}>{opt.e}</span>
              <span style={{fontSize:'14px',fontWeight:q1===opt.v?600:400,color:q1===opt.v?'var(--accent)':'var(--text)',fontFamily:'var(--sans)'}}>{opt.l}</span>
              {q1===opt.v&&<span style={{marginLeft:'auto',color:'var(--accent)'}}>✓</span>}
            </button>
          ))}
        </div>
        <div>
          <div style={{fontSize:'12px',color:'var(--label)',fontFamily:'var(--mono)',marginBottom:'10px'}}>2 — {t.q2.toUpperCase()}</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
            {t.q2opts.map(v=><Tag key={v} label={v} selected={q2.includes(v)} onClick={()=>toggle2(v)}/>)}
          </div>
        </div>
        <div>
          <div style={{fontSize:'12px',color:'var(--label)',fontFamily:'var(--mono)',marginBottom:'10px'}}>3 — {t.q3.toUpperCase()}</div>
          {t.q3opts.map(opt=>(
            <button key={opt.v} onClick={()=>setQ3(opt.v)} style={{display:'flex',alignItems:'center',gap:'12px',padding:'14px 16px',borderRadius:'12px',border:`1px solid ${q3===opt.v?'var(--accent)':'var(--border)'}`,background:q3===opt.v?'var(--adim)':'var(--card)',cursor:'pointer',textAlign:'left',width:'100%',marginBottom:'8px',transition:'all 0.18s'}}>
              <span style={{fontSize:'20px'}}>{opt.e}</span>
              <span style={{fontSize:'14px',fontWeight:q3===opt.v?600:400,color:q3===opt.v?'var(--accent)':'var(--text)',fontFamily:'var(--sans)'}}>{opt.l}</span>
              {q3===opt.v&&<span style={{marginLeft:'auto',color:'var(--accent)'}}>✓</span>}
            </button>
          ))}
        </div>
      </div>
      <div style={{position:'fixed',bottom:0,left:0,right:0,maxWidth:'480px',margin:'0 auto',padding:'14px 24px 32px',background:'var(--bg)f0',backdropFilter:'blur(16px)',borderTop:'1px solid var(--border)',display:'flex',flexDirection:'column',gap:'10px'}}>
        <Btn onClick={submit} disabled={!ready}>{t.regenBtn}</Btn>
        <button onClick={onSkip} style={{background:'transparent',border:'none',color:'var(--muted)',fontSize:'13px',cursor:'pointer',padding:'8px',fontFamily:'var(--sans)'}}>{t.fullQuestionnaire}</button>
      </div>
    </div>
  );
}


// ── STATS SCREEN ───────────────────────────────────────────────────────────────
function StatsScreen({client,programs,onBack}){
  const lang=localStorage.getItem(LANG_STORAGE_KEY)||"fr";
  const t=TR[lang]||TR.fr;
  const[tab,setTab]=useState("exercises");
  const[selectedExercise,setSelectedExercise]=useState(null);
  const perfKey=`iq:perflog:${client.toLowerCase()}`;
  const logs=db.get(perfKey)||[];

  // ── Data processing ─────────────────────────────────────────────────
  // All exercises with weight data
  const allExercises=[...new Set(
    logs.flatMap(log=>log.exercises.filter(e=>e.weight).map(e=>e.name))
  )].sort();

  // Data per exercise
  const exerciseData=(exName)=>logs
    .filter(log=>log.exercises.some(e=>e.name===exName&&e.weight))
    .map(log=>{
      const ex=log.exercises.find(e=>e.name===exName);
      const weightNum=parseFloat((ex?.weight||"0").replace(/[^0-9.]/g,""))||0;
      return{date:log.date,weight:weightNum,raw:ex?.weight||"",sessionName:log.sessionName,feeling:ex?.feeling||""};
    }).reverse();

  // Data per week
  const weeklyData=(()=>{
    const weeks={};
    logs.forEach(log=>{
      const week=`S${log.weekNumber||1} — ${new Date(log.date).toLocaleDateString(lang==="fr"?"fr-FR":"en-US",{month:"short",day:"numeric"})}`;
      if(!weeks[week])weeks[week]={week,sessions:0,exercises:0,totalFeeling:0,feelingCount:0,date:log.date};
      weeks[week].sessions++;
      weeks[week].exercises+=log.exercises.length;
      if(log.ressenti){
        const map={"Trop facile":1,"Parfait":2,"Difficile":3,"Épuisant":4,"Too easy":1,"Perfect":2,"Hard":3,"Exhausting":4};
        weeks[week].totalFeeling+=(map[log.ressenti]||2);
        weeks[week].feelingCount++;
      }
    });
    return Object.values(weeks).sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-8);
  })();

  // Data per session
  const sessionData=logs.slice(0,20).map(log=>({
    name:log.sessionName,
    date:new Date(log.date).toLocaleDateString(lang==="fr"?"fr-FR":"en-US",{day:"numeric",month:"short"}),
    exercises:log.exercises.length,
    pct:log.pctCompleted||100,
    duration:log.duration||0,
    ressenti:log.ressenti||"",
    feeling:{"Trop facile":"😊","Parfait":"💪","Difficile":"😤","Épuisant":"🔥","Too easy":"😊","Perfect":"💪","Hard":"😤","Exhausting":"🔥"}[log.ressenti]||"💪",
  }));

  // ── SVG Line Chart ──────────────────────────────────────────────────
  const LineChart=({data,color="var(--accent)",label=""})=>{
    if(!data||data.length<2)return(
      <div style={{height:120,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--muted)",fontSize:"13px"}}>
        {lang==="fr"?"Pas assez de données (min. 2 séances)":"Not enough data (min. 2 sessions)"}
      </div>
    );
    const vals=data.map(d=>d.weight).filter(v=>v>0);
    if(!vals.length)return null;
    const min=Math.min(...vals)*0.9;
    const max=Math.max(...vals)*1.1||1;
    const W=300,H=100,PAD=8;
    const pts=data.map((d,i)=>{
      const x=PAD+(i/(data.length-1))*(W-PAD*2);
      const y=H-PAD-((d.weight-min)/(max-min||1))*(H-PAD*2);
      return{x,y,d};
    });
    const pathD=pts.map((p,i)=>`${i===0?"M":"L"}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" ");
    const areaD=pathD+` L${pts[pts.length-1].x.toFixed(1)},${H} L${pts[0].x.toFixed(1)},${H} Z`;
    // Trend
    const first=vals[0],last2=vals[vals.length-1];
    const trend=last2>first?"↑":last2<first?"↓":"→";
    const trendColor=last2>first?"var(--green)":last2<first?"var(--red)":"var(--label)";
    return(
      <div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
          <span style={{fontSize:"11px",color:"var(--label)"}}>{label}</span>
          <span style={{fontSize:"20px",fontWeight:700,color:trendColor,fontFamily:"var(--mono)"}}>{trend} {last2>0?last2+" kg":""}</span>
        </div>
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H,overflow:"visible"}}>
          <defs>
            <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={areaD} fill="url(#grad)"/>
          <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          {pts.map((p,i)=>(
            <g key={i}>
              <circle cx={p.x} cy={p.y} r="4" fill={i===pts.length-1?"var(--green)":color} stroke="var(--bg)" strokeWidth="2"/>
              {i===pts.length-1&&<text x={p.x} y={p.y-8} textAnchor="middle" fontSize="9" fill="var(--green)" fontFamily="monospace">{p.d.raw}</text>}
            </g>
          ))}
          <text x={PAD} y={H-2} fontSize="8" fill="var(--muted)" fontFamily="monospace">{data[0]?.date?.slice(5,10)||""}</text>
          <text x={W-PAD} y={H-2} fontSize="8" fill="var(--muted)" fontFamily="monospace" textAnchor="end">{data[data.length-1]?.date?.slice(5,10)||""}</text>
        </svg>
      </div>
    );
  };

  // ── Bar Chart ───────────────────────────────────────────────────────
  const BarChart=({data,valueKey,color="var(--accent)",maxVal})=>{
    if(!data||!data.length)return<div style={{color:"var(--muted)",fontSize:"13px",textAlign:"center",padding:"20px"}}>{lang==="fr"?"Aucune donnée":"No data"}</div>;
    const max2=maxVal||Math.max(...data.map(d=>d[valueKey]||0))||1;
    return(
      <div style={{display:"flex",gap:"8px",alignItems:"flex-end",height:"100px",padding:"0 4px"}}>
        {data.map((d,i)=>{
          const val=d[valueKey]||0;
          const pct=Math.max(4,(val/max2)*100);
          return(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
              <div style={{fontSize:"9px",color:"var(--label)",fontFamily:"var(--mono)"}}>{val||""}</div>
              <div style={{width:"100%",height:`${pct}%`,background:color,borderRadius:"4px 4px 0 0",transition:"height 0.5s ease",minHeight:"4px",boxShadow:i===data.length-1?`0 0 8px ${color}88`:"none"}}/>
              <div style={{fontSize:"8px",color:"var(--muted)",textAlign:"center",lineHeight:1.2,maxWidth:"32px",overflow:"hidden"}}>{d.week||d.date||d.name}</div>
            </div>
          );
        })}
      </div>
    );
  };

  const totalSessions=logs.length;
  const totalExercisesLogged=logs.reduce((n,l)=>n+(l.exercises?.length||0),0);
  const avgDuration=logs.length?Math.round(logs.reduce((n,l)=>n+(l.duration||0),0)/logs.length):0;

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",fontFamily:"var(--sans)",color:"var(--text)",paddingBottom:"60px",animation:"fadeUp 0.35s ease"}}>
      <LangThemeBar/>
      {/* Header */}
      <div style={{padding:"52px 24px 20px",borderBottom:"1px solid var(--border)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"14px"}}>
          <button onClick={onBack} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--muted)",padding:"10px 14px",borderRadius:"10px",cursor:"pointer",fontSize:"16px"}}>←</button>
          <div>
            <div style={{fontSize:"11px",color:"var(--accent)",fontFamily:"var(--mono)",letterSpacing:"0.2em"}}>📊 {lang==="fr"?"MES PERFORMANCES":"MY PERFORMANCE"}</div>
            <div style={{fontFamily:"var(--serif)",fontSize:"22px",fontWeight:700}}>{lang==="fr"?"Suivi & Analyses":"Tracking & Stats"}</div>
          </div>
        </div>
        {/* Global stats */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"8px",marginTop:"20px"}}>
          {[
            {icon:"💪",val:totalSessions,label:lang==="fr"?"Séances":"Sessions"},
            {icon:"📋",val:totalExercisesLogged,label:lang==="fr"?"Exercices":"Exercises"},
            {icon:"⏱",val:avgDuration?avgDuration+"m":"-",label:lang==="fr"?"Durée moy.":"Avg duration"},
          ].map((s,i)=>(
            <div key={i} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:"20px",marginBottom:"4px"}}>{s.icon}</div>
              <div style={{fontSize:"22px",fontWeight:700,fontFamily:"var(--mono)",color:"var(--accent)"}}>{s.val}</div>
              <div style={{fontSize:"11px",color:"var(--label)",marginTop:"2px"}}>{s.label}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Tab selector */}
      <div style={{display:"flex",padding:"16px 24px 0",gap:"8px"}}>
        {[
          {id:"exercises",icon:"🏋️",label:lang==="fr"?"Par exercice":"By exercise"},
          {id:"weekly",icon:"📅",label:lang==="fr"?"Par semaine":"By week"},
          {id:"sessions",icon:"⚡",label:lang==="fr"?"Par séance":"By session"},
        ].map(tab2=>(
          <button key={tab2.id} onClick={()=>{setTab(tab2.id);setSelectedExercise(null);}} style={{
            flex:1,padding:"10px 8px",borderRadius:"12px",cursor:"pointer",fontFamily:"var(--sans)",
            fontSize:"11px",fontWeight:tab===tab2.id?700:400,transition:"all 0.2s",
            border:`1px solid ${tab===tab2.id?"var(--accent)":"var(--border)"}`,
            background:tab===tab2.id?"var(--adim)":"var(--card)",
            color:tab===tab2.id?"var(--accent)":"var(--label)",
          }}>
            <div style={{fontSize:"16px",marginBottom:"3px"}}>{tab2.icon}</div>
            {tab2.label}
          </button>
        ))}
      </div>

      <div style={{padding:"20px 24px"}}>

        {/* ── TAB: BY EXERCISE ── */}
        {tab==="exercises"&&(
          <div>
            {allExercises.length===0&&(
              <div style={{textAlign:"center",padding:"48px 0",color:"var(--muted)"}}>
                <div style={{fontSize:"48px",marginBottom:"16px"}}>📊</div>
                <div style={{fontSize:"14px",lineHeight:1.7}}>
                  {lang==="fr"?"Aucune donnée pour l'instant.
Utilisez le journal pendant vos séances pour enregistrer vos poids.":"No data yet.
Use the workout log during sessions to record your weights."}
                </div>
              </div>
            )}
            {!selectedExercise?(
              <div>
                <div style={{fontSize:"11px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"14px"}}>{lang==="fr"?"SÉLECTIONNER UN EXERCICE":"SELECT AN EXERCISE"}</div>
                {allExercises.map((exName,i)=>{
                  const data=exerciseData(exName);
                  const latest=data[data.length-1];
                  const first2=data[0];
                  const progress=latest&&first2&&latest.weight>0&&first2.weight>0?((latest.weight-first2.weight)/first2.weight*100).toFixed(0):null;
                  return(
                    <button key={i} onClick={()=>setSelectedExercise(exName)} style={{
                      display:"flex",alignItems:"center",gap:"14px",padding:"16px",
                      background:"var(--card)",border:"1px solid var(--border)",
                      borderRadius:"14px",marginBottom:"10px",cursor:"pointer",
                      textAlign:"left",width:"100%",transition:"all 0.18s",
                    }}>
                      <div style={{width:"44px",height:"44px",borderRadius:"12px",background:"var(--adim)",border:"1px solid var(--accent)20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"20px",flexShrink:0}}>🏋️</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:"14px",fontWeight:600,color:"var(--text)",marginBottom:"4px"}}>{exName}</div>
                        <div style={{fontSize:"12px",color:"var(--label)"}}>
                          {data.length} {lang==="fr"?"séance":"session"}{data.length>1?"s":""}
                          {latest?.raw&&<span style={{color:"var(--accent)",marginLeft:"8px",fontFamily:"var(--mono)"}}>⟶ {latest.raw}</span>}
                        </div>
                      </div>
                      {progress!==null&&(
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:"16px",fontWeight:700,fontFamily:"var(--mono)",color:Number(progress)>0?"var(--green)":Number(progress)<0?"var(--red)":"var(--label)"}}>
                            {Number(progress)>0?"+":""}{progress}%
                          </div>
                          <div style={{fontSize:"10px",color:"var(--muted)"}}>{lang==="fr"?"progression":"progress"}</div>
                        </div>
                      )}
                      <span style={{color:"var(--muted)",fontSize:"18px"}}>›</span>
                    </button>
                  );
                })}
              </div>
            ):(
              <div style={{animation:"fadeUp 0.3s ease"}}>
                <button onClick={()=>setSelectedExercise(null)} style={{display:"flex",alignItems:"center",gap:"8px",background:"transparent",border:"none",color:"var(--accent)",cursor:"pointer",fontSize:"13px",fontFamily:"var(--sans)",marginBottom:"20px",padding:"4px 0"}}>
                  ← {lang==="fr"?"Tous les exercices":"All exercises"}
                </button>
                <h3 style={{fontFamily:"var(--serif)",fontSize:"20px",fontWeight:700,marginBottom:"20px",letterSpacing:"-0.01em"}}>{selectedExercise}</h3>
                {/* Line chart */}
                <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"18px",marginBottom:"16px"}}>
                  <div style={{fontSize:"10px",color:"var(--accent)",fontFamily:"var(--mono)",marginBottom:"14px"}}>📈 {lang==="fr"?"PROGRESSION DU POIDS":"WEIGHT PROGRESSION"}</div>
                  <LineChart data={exerciseData(selectedExercise)} label={lang==="fr"?"Poids utilisé (kg)":"Weight used (kg)"}/>
                </div>
                {/* History table */}
                <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"18px"}}>
                  <div style={{fontSize:"10px",color:"var(--label)",fontFamily:"var(--mono)",marginBottom:"14px"}}>{lang==="fr"?"HISTORIQUE DÉTAILLÉ":"DETAILED HISTORY"}</div>
                  {exerciseData(selectedExercise).reverse().slice(0,10).map((d,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 0",borderBottom:i<9?"1px solid var(--border)33":"none"}}>
                      <div>
                        <div style={{fontSize:"13px",color:"var(--text)",fontWeight:500}}>{d.sessionName}</div>
                        <div style={{fontSize:"11px",color:"var(--muted)",marginTop:"2px",fontFamily:"var(--mono)"}}>{new Date(d.date).toLocaleDateString(lang==="fr"?"fr-FR":"en-US",{day:"numeric",month:"short"})}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:"16px",fontWeight:700,color:"var(--accent)",fontFamily:"var(--mono)"}}>{d.raw}</div>
                        {d.feeling&&<div style={{fontSize:"16px",marginTop:"2px"}}>
                          {{"facile":"😊","easy":"😊","moyen":"😐","medium":"😐","dur":"😤","hard":"😤","trop dur":"💀","too hard":"💀"}[d.feeling]||"💪"}
                        </div>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ── TAB: BY WEEK ── */}
        {tab==="weekly"&&(
          <div>
            {weeklyData.length===0&&(
              <div style={{textAlign:"center",padding:"48px 0",color:"var(--muted)"}}>
                <div style={{fontSize:"48px",marginBottom:"16px"}}>📅</div>
                <div style={{fontSize:"14px"}}>{lang==="fr"?"Aucune séance enregistrée":"No sessions recorded yet"}</div>
              </div>
            )}
            {weeklyData.length>0&&(
              <>
                <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"18px",marginBottom:"16px"}}>
                  <div style={{fontSize:"10px",color:"var(--accent)",fontFamily:"var(--mono)",marginBottom:"14px"}}>📊 {lang==="fr"?"SÉANCES PAR SEMAINE":"SESSIONS PER WEEK"}</div>
                  <BarChart data={weeklyData} valueKey="sessions" color="var(--accent)"/>
                </div>
                <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"18px",marginBottom:"16px"}}>
                  <div style={{fontSize:"10px",color:"var(--orange)",fontFamily:"var(--mono)",marginBottom:"14px"}}>💪 {lang==="fr"?"EXERCICES ENREGISTRÉS PAR SEMAINE":"LOGGED EXERCISES PER WEEK"}</div>
                  <BarChart data={weeklyData} valueKey="exercises" color="var(--orange)"/>
                </div>
                {/* Weekly summary cards */}
                {weeklyData.slice().reverse().map((w,i)=>(
                  <div key={i} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"14px",padding:"16px",marginBottom:"10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:"14px",fontWeight:700,color:"var(--text)"}}>{w.week}</div>
                        <div style={{fontSize:"12px",color:"var(--label)",marginTop:"3px"}}>
                          {w.sessions} {lang==="fr"?"séance":"session"}{w.sessions>1?"s":""} · {w.exercises} {lang==="fr"?"exercice":"exercise"}{w.exercises>1?"s":""}
                        </div>
                      </div>
                      <div style={{fontSize:"28px"}}>{w.sessions>=3?"🔥":w.sessions>=2?"💪":"😴"}</div>
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

        {/* ── TAB: BY SESSION ── */}
        {tab==="sessions"&&(
          <div>
            {sessionData.length===0&&(
              <div style={{textAlign:"center",padding:"48px 0",color:"var(--muted)"}}>
                <div style={{fontSize:"48px",marginBottom:"16px"}}>⚡</div>
                <div style={{fontSize:"14px"}}>{lang==="fr"?"Aucune séance terminée":"No completed sessions yet"}</div>
              </div>
            )}
            {sessionData.length>0&&(
              <>
                <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"18px",marginBottom:"16px"}}>
                  <div style={{fontSize:"10px",color:"var(--green)",fontFamily:"var(--mono)",marginBottom:"14px"}}>✓ {lang==="fr"?"TAUX DE COMPLÉTION PAR SÉANCE":"COMPLETION RATE PER SESSION"}</div>
                  <BarChart data={sessionData.slice().reverse()} valueKey="pct" color="var(--green)" maxVal={100}/>
                </div>
                {sessionData.map((s,i)=>(
                  <div key={i} style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"14px",padding:"16px",marginBottom:"10px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"8px"}}>
                          <span style={{fontSize:"20px"}}>{s.feeling}</span>
                          <div>
                            <div style={{fontSize:"14px",fontWeight:600,color:"var(--text)"}}>{s.name}</div>
                            <div style={{fontSize:"11px",color:"var(--muted)",fontFamily:"var(--mono)"}}>{s.date}</div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
                          {[
                            {l:`${s.exercises} ${lang==="fr"?"exercices":"exercises"}`,c:"var(--accent)"},
                            s.duration>0?{l:`${s.duration} min`,c:"var(--orange)"}:null,
                            {l:`${s.pct}% ${lang==="fr"?"complété":"done"}`,c:s.pct===100?"var(--green)":"var(--label)"},
                          ].filter(Boolean).map((b2,j)=>(
                            <span key={j} style={{fontSize:"11px",color:b2.c,background:`${b2.c}15`,border:`1px solid ${b2.c}30`,padding:"3px 8px",borderRadius:"20px",fontWeight:500}}>{b2.l}</span>
                          ))}
                        </div>
                      </div>
                    </div>
                    {/* Progress bar */}
                    <div style={{marginTop:"10px",height:"4px",background:"var(--border)",borderRadius:"2px"}}>
                      <div style={{height:"100%",width:`${s.pct}%`,background:s.pct===100?"var(--green)":"var(--accent)",borderRadius:"2px",transition:"width 1s ease"}}/>
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        )}

      </div>
    </div>
  );
}

function App(){
  const lang=localStorage.getItem(LANG_STORAGE_KEY)||'fr';
  const t=TR[lang]||TR.fr;
  const showOnboarding=!localStorage.getItem('iq_onboarded');
  const[screen,setScreen]=useState(showOnboarding?'onboarding':'welcome');
  const[regenMode,setRegenMode]=useState(false);
  const[client,setClient]=useState(null);
  const[programs,setPrograms]=useState([]);
  const[currentProgram,setCurrentProgram]=useState(null);
  const[sessionIdx,setSessionIdx]=useState(0);
  const[newBadge,setNewBadge]=useState(null);

  const loadClient=name=>{
    const key=`iq:programs:${name.toLowerCase()}`;
    const progs=(db.get(key)||[]).sort((a,b)=>new Date(b.date)-new Date(a.date));
    setPrograms(progs);setClient(name);setScreen("home");
    const list=db.getShared("iq:clients-list")||[];
    const found=list.find(c=>c.name.toLowerCase()===name.toLowerCase());
    if(!found){list.push({name,programCount:progs.length,lastDate:progs[0]?.date||null});db.setShared("iq:clients-list",list);}
  };

  const saveProgram=prog=>{
    const key=`iq:programs:${client.toLowerCase()}`;
    const existing=db.get(key)||[];
    const newList=[prog,...existing];
    db.set(key,newList);setPrograms(newList);
    const list=db.getShared("iq:clients-list")||[];
    const idx=list.findIndex(c=>c.name.toLowerCase()===client.toLowerCase());
    const entry={name:client,programCount:newList.length,lastDate:prog.date};
    if(idx>=0)list[idx]=entry;else list.push(entry);
    db.setShared("iq:clients-list",list);
    // Check badges
    const totalSessions=newList.reduce((n,p)=>n+(p.sessionsCompleted||0),0);
    const earned=checkAndAwardBadges(client,newList,totalSessions);
    if(earned.length>0){setNewBadge(earned[0]);setTimeout(()=>setNewBadge(null),4000);}
  };

  const onSessionDone=(result)=>{
    // Save detailed performance log
    const session=currentProgram?.programme?.sessions?.[sessionIdx];
    if(result&&result.journal&&session){
      const perfKey=`iq:perflog:${client.toLowerCase()}`;
      const existing=db.get(perfKey)||[];
      const entry={
        date:new Date().toISOString(),
        programId:currentProgram.id,
        programTitle:currentProgram.titre,
        sessionIndex:sessionIdx,
        sessionName:session.nom||("Séance "+(sessionIdx+1)),
        weekNumber:Math.ceil(((currentProgram.sessionsCompleted||0)+1)/currentProgram.seances),
        duration:result.duration||0,
        ressenti:result.ressenti||"",
        pctCompleted:result.completed?100:result.pct||0,
        exercises:Object.entries(result.journal||{}).map(([id,data])=>{
          const [bi,ei]=id.split('-').map(Number);
          const ex=session.blocs?.[bi]?.exercices?.[ei];
          return{
            id,name:ex?.nom||id,
            series:ex?.series,reps:ex?.reps,
            weight:data.poids||"",
            feeling:data.ressenti||"",
            pain:data.douleurs||"",
          };
        }).filter(e=>e.weight||e.feeling),
      };
      db.set(perfKey,[entry,...existing].slice(0,200));// keep last 200
    }
    // Update program with session data
    const key=`iq:programs:${client.toLowerCase()}`;
    const progs=db.get(key)||[];
    const updated=progs.map((p,i)=>{
      if(i===0)return{...p,sessionsCompleted:(p.sessionsCompleted||0)+1};
      return p;
    });
    db.set(key,updated);setPrograms(updated);
    if(updated[0])setCurrentProgram(updated[0]);
    // Update streak
    const today=new Date().toDateString();
    const lastDay=db.get(`iq:lastday:${client.toLowerCase()}`);
    const streak=db.get(`iq:streak:${client.toLowerCase()}`)||0;
    if(lastDay!==today){
      db.set(`iq:lastday:${client.toLowerCase()}`,today);
      db.set(`iq:streak:${client.toLowerCase()}`,streak+1);
    }
    // Check badges
    const totalSessions=updated.reduce((n,p)=>n+(p.sessionsCompleted||0),0);
    const earned=checkAndAwardBadges(client,updated,totalSessions);
    if(earned.length>0){setNewBadge(earned[0]);setTimeout(()=>setNewBadge(null),4000);}
    setScreen("program");
  };

  const generate=async formData=>{
    setScreen("generating");
    const goal=GOALS.find(g=>g.id===formData.objectif);
    const equipStr=formData.equipements?.map(id=>EQUIPEMENTS.find(e=>e.id===id)?.label).filter(Boolean).join(", ")||"Non précisé";
    const imc=(formData.poids/((formData.taille/100)**2)).toFixed(1);
    const userMsg=`Profil client complet :
Prénom: ${formData.prenom} | Âge: ${formData.age} ans | Genre: ${formData.genre||"non précisé"}
Poids: ${formData.poids}kg | Taille: ${formData.taille}cm | IMC: ${imc}
Morphotype: ${MORPHO.find(m=>m.id===formData.morpho)?.label||"non précisé"} | Silhouette: ${formData.silhouette||"non précisée"}
Activité actuelle: ${formData.activite||"non précisé"}
Blessures: ${formData.blessures?.join(", ")||"Aucune"} | Douleurs: ${formData.douleurs||"aucune"}
Sommeil: ${formData.sommeil}/5 | Stress: ${formData.stress}/5 | Énergie: ${formData.energie}/5
Objectif principal: ${goal?.label||formData.objectif}${formData.sportSpec?` (${formData.sportSpec})`:""}
Priorités secondaires: ${formData.priorites?.join(", ")||"aucune"}
Compétition: ${formData.competition?`Oui le ${formData.dateCompe}`:"Non"}
Séances: ${formData.seances}/semaine | Durée: ${formData.duree} min
Jours disponibles: ${formData.joursDispos?.join(", ")||"non précisé"} | Créneaux: ${formData.creneaux?.join(", ")||"non précisé"}
Expérience: ${formData.experience||"non précisé"} | Sports passés: ${formData.sportsAnte||"aucun"}
Points forts: ${formData.pointsForts||"non précisé"} | Points faibles: ${formData.pointsFaibles||"non précisé"}
Équipements: ${equipStr} | Lieu: ${formData.lieu||"non précisé"}
Nutrition: ${formData.alimentaire||"non précisé"} | Suppléments: ${formData.supplements||"aucun"} | Hydratation: ${formData.hydratation||"non précisé"}
Préférences: ${formData.preferences?.join(", ")||"non précisé"} | Style: ${formData.styleEntrainement||"non précisé"}
Motivations: ${formData.motivations||"non précisé"} | Autres: ${formData.autresInfos||"aucune"}
Génère exactement ${formData.seances} séances dans sessions. Le champ compatibilite doit être un nombre entre 88 et 98.`;

    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":API_KEY,
          "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:5000,
          system:SYSTEM_PROMPT,messages:[{role:"user",content:userMsg}]}),
      });
      const data=await res.json();
      const text=data.content?.map(c=>c.text||"").join("")||"";
      const clean=text.replace(/```json|```/g,"").trim();
      let parsed=null;try{parsed=JSON.parse(clean);}catch(e){console.error("Parse error",e);}
      const progData={
        id:Date.now(),date:new Date().toISOString(),
        goal:formData.objectif,
        titre:parsed?.titre||`Programme ${goal?.label} — ${formData.prenom}`,
        seances:formData.seances,duree:formData.duree,niveau:formData.experience,
        compatibilite:parsed?.compatibilite||null,
        difficulte:parsed?.difficulte||null,
        analyse:parsed?.analyse||"",
        programme:parsed,rawText:clean,
        sessionsCompleted:0,
      };
      saveProgram(progData);setCurrentProgram(progData);setScreen("program");
    }catch(err){
      console.error(err);alert("Erreur: "+err.message);setScreen("questionnaire");
    }
  };

  return(
    <div>
      {/* Badge notification */}
      {newBadge&&(
        <div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",
          zIndex:9999,background:"var(--card)",border:"1px solid var(--yellow)",
          borderRadius:"16px",padding:"14px 20px",
          boxShadow:"0 8px 32px #000a, 0 0 20px var(--yellow)30",
          display:"flex",alignItems:"center",gap:"12px",
          animation:"popIn 0.4s ease, fadeUp 0.4s ease",
          maxWidth:"320px",width:"calc(100% - 48px)"}}>
          <span style={{fontSize:"28px"}}>{newBadge.icon}</span>
          <div>
            <div style={{fontSize:"11px",color:"var(--yellow)",fontFamily:"var(--mono)",marginBottom:"2px"}}>BADGE DÉBLOQUÉ !</div>
            <div style={{fontSize:"14px",fontWeight:700}}>{newBadge.label}</div>
          </div>
        </div>
      )}

      {screen==="onboarding"&&<OnboardingScreen onDone={()=>{localStorage.setItem('iq_onboarded','1');setScreen('welcome');}}/>}
      {screen==="quickregen"&&<QuickRegenScreen lastProgram={programs[0]} onSubmit={(note)=>{setRegenMode(true);setScreen('questionnaire');}} onSkip={()=>{setRegenMode(false);setScreen('questionnaire');}}/>}
      {screen==="welcome"&&<WelcomeScreen onClient={loadClient} onCoach={()=>setScreen("coach")}/>}
      {screen==="home"&&<HomeScreen client={client} programs={programs}
        onNew={(regen)=>{if(regen){setScreen('quickregen');}else{setRegenMode(false);setScreen('questionnaire');}}}
        onStats={()=>setScreen("stats")}
        onViewProgram={p=>{setCurrentProgram(p);setScreen("program");}}
        onSession={(p,i)=>{setCurrentProgram(p);setSessionIdx(i||0);setScreen("session");}}
        onHistory={()=>setScreen("history")}
        onBack={()=>{setClient(null);setPrograms([]);setScreen("welcome");}}/>}
      {screen==="questionnaire"&&<QuestionnaireScreen clientName={client} onSubmit={generate} onBack={()=>setScreen("home")}/>}
      {screen==="generating"&&<GeneratingScreen/>}
      {screen==="program"&&currentProgram&&<ProgramScreen
        program={currentProgram} clientName={client}
        onStartSession={(prog,i)=>{setSessionIdx(i);setScreen("session");}}
        onBack={()=>setScreen("home")} onNew={()=>setScreen("questionnaire")}/>}
      {screen==="session"&&currentProgram?.programme&&<SessionScreen
        sessions={currentProgram.programme.sessions}
        sessionIndex={sessionIdx} clientName={client}
        programId={currentProgram.id} onDone={onSessionDone}/>}
      {screen==="history"&&<HistoryScreen programs={programs}
        onSelect={p=>{setCurrentProgram(p);setScreen("program");}} onBack={()=>setScreen("home")}/>}
      {screen==="stats"&&<StatsScreen client={client} programs={programs} onBack={()=>setScreen("home")}/>}
      {screen==="coach"&&<CoachScreen onBack={()=>setScreen("welcome")}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
